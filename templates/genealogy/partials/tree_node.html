<li class="tree-node">
    <button
        class="tree-person"
        type="button"
        data-member-id="{{ node.member.id }}"
        data-member-name="{{ node.member.full_name }}"
        data-member-generation="Đời thứ {{ node.member.generation }}"
        data-member-years="{{ node.member.lifespan }}"
        data-member-hometown="{% if node.member.hometown %}Quê quán: {{ node.member.hometown }}{% else %}Quê quán: Chưa cập nhật{% endif %}"
        data-member-spouse="{% if node.member.spouse_name %}Phối ngẫu: {{ node.member.spouse_name }}{% else %}Phối ngẫu: Chưa cập nhật{% endif %}"
        data-member-bio="{% if node.member.biography %}{{ node.member.biography }}{% else %}Chưa có mô tả chi tiết.{% endif %}"
    >
        <span class="tree-person__couple">
            <span class="tree-person__name">{{ node.member.full_name }}</span>
            {% if node.member.spouse_name %}
                <span class="tree-person__partner">{{ node.member.spouse_name }}</span>
            {% endif %}
        </span>
        <span class="tree-person__meta">Đời {{ node.member.generation }}</span>
        {% if node.member.birth_year %}
            <span class="tree-person__meta">{{ node.member.birth_year }}</span>
        {% endif %}
    </button>

    {% if node.children %}
        <ul class="tree-list">
            {% for node in node.children %}
                {% include 'genealogy/partials/tree_node.html' with node=node %}
            {% endfor %}
        </ul>
    {% endif %}
</li>
